<div class="editor-container">
  <header class="editor-header">
    <button class="btn-outline back-btn" routerLink="/">
      ← К списку статей
    </button>
    <h1>{{ isEditMode ? "Редактирование статьи" : "Новая статья" }}</h1>
  </header>

  <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="editor-form">
    <div class="form-group">
      <label for="title">Заголовок</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Введите заголовок статьи"
        [class.invalid]="
          articleForm.get('title')?.invalid && articleForm.get('title')?.touched
        "
      />
      @if (
        articleForm.get("title")?.invalid && articleForm.get("title")?.touched
      ) {
        <small class="error-text">Заголовок обязателен</small>
      }
    </div>

    <div class="form-group">
      <label for="content">Текст статьи</label>
      <textarea
        id="content"
        formControlName="content"
        placeholder="Напишите или вставьте текст статьи сюда..."
        rows="15"
        [class.invalid]="
          articleForm.get('content')?.invalid &&
          articleForm.get('content')?.touched
        "
      ></textarea>
      @if (
        articleForm.get("content")?.invalid &&
        articleForm.get("content")?.touched
      ) {
        <small class="error-text">Текст статьи обязателен</small>
      }
    </div>

    <div class="form-actions">
      <button type="button" class="btn-outline" (click)="cancel()">
        Отмена
      </button>
      <button
        type="submit"
        class="btn-primary"
        [disabled]="articleForm.invalid"
      >
        {{ isEditMode ? "Сохранить изменения" : "Опубликовать" }}
      </button>
    </div>
  </form>
</div>
